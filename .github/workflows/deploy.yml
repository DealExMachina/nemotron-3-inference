name: 🚀 Deploy to Koyeb

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'koyeb.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build (redeploy only)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USER }}/nemotron-3-inference
  KOYEB_APP_NAME: nemotron-3-inference
  KOYEB_SERVICE_NAME: nemotron

jobs:
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'
    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_KEY }}

      - name: 🏷️ Compute SHA tag
        id: sha
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          echo "tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "📌 SHA tag: $SHA_TAG"

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧹 Clean up disk space
        run: |
          docker system prune -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: 🏗️ Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-koyeb:
    name: 🚀 Deploy to Koyeb
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event.inputs.skip_build != 'true' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    environment:
      name: production
      url: https://nemotron-3-inference-dealexmachina-53d19e1c.koyeb.app

    steps:
      - name: 🚀 Deploy to Koyeb via API
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          SERVICE_ID="0660f41c-9519-406d-8caa-5c4587dfa03b"
          
          if [ "${{ github.event.inputs.skip_build }}" = "true" ]; then
            IMAGE="${{ env.IMAGE_NAME }}:latest"
          else
            IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.sha-tag }}"
          fi
          
          echo "📦 Deploying image: $IMAGE"
          echo "📍 Service ID: $SERVICE_ID"
          
          # Update service using Koyeb API (capture response, fail on error)
          response=$(curl -s -w "\n%{http_code}" -X PATCH "https://app.koyeb.com/v1/services/$SERVICE_ID" \
            -H "Authorization: Bearer ${KOYEB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"definition\": {
                \"name\": \"nemotron\",
                \"type\": \"WEB\",
                \"strategy\": {\"type\": \"DEPLOYMENT_STRATEGY_TYPE_ROLLING\"},
                \"routes\": [{\"path\": \"/\", \"port\": 8000}],
                \"ports\": [{\"port\": 8000, \"protocol\": \"http\"}],
                \"proxy_ports\": [],
                \"env\": [
                  {\"scopes\": [\"region:sfo\"], \"key\": \"HF_TOKEN\", \"secret\": \"hf-token\"},
                  {\"scopes\": [\"region:sfo\"], \"key\": \"VLLM_ATTENTION_BACKEND\", \"value\": \"FLASHINFER\"}
                ],
                \"regions\": [\"sfo\"],
                \"scalings\": [{
                  \"scopes\": [\"region:sfo\"],
                  \"min\": 1,
                  \"max\": 1
                }],
                \"instance_types\": [{\"scopes\": [\"region:sfo\"], \"type\": \"gpu-nvidia-h100\"}],
                \"health_checks\": [{
                  \"http\": {\"path\": \"/health\", \"port\": 8000, \"method\": \"GET\", \"headers\": []},
                  \"grace_period\": 300,
                  \"interval\": 30,
                  \"timeout\": 10,
                  \"restart_limit\": 3
                }],
                \"volumes\": [],
                \"config_files\": [],
                \"skip_cache\": false,
                \"docker\": {
                  \"image\": \"$IMAGE\",
                  \"image_registry_secret\": \"jeanbapt\",
                  \"privileged\": false
                }
              }
            }")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Koyeb API response: $http_code"
          echo "$body" | head -20
          if [ "$http_code" != "200" ]; then
            echo "❌ Koyeb API error (HTTP $http_code)"
            exit 1
          fi
          echo "✅ Service update triggered!"

      - name: ⏳ Wait for deployment
        run: sleep 60

      - name: 🏥 Health check
        run: |
          SERVICE_URL="https://nemotron-3-inference-dealexmachina-53d19e1c.koyeb.app"
          
          for i in {1..5}; do
            echo "🔍 Health check attempt $i/5..."
            response=$(curl -s -w "%{http_code}" -o /dev/null "$SERVICE_URL/health" --max-time 30 || echo "000")
            
            if [ "$response" = "200" ]; then
              echo "✅ Deployment is healthy!"
              exit 0
            fi
            echo "⏳ Status: $response, retrying in 60s..."
            sleep 60
          done
          
          echo "⚠️ Health check did not pass, but deployment may still be starting up."

      - name: 📝 Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Deployment Summary
          - **App**: \`${{ env.KOYEB_APP_NAME }}\`
          - **Service**: \`${{ env.KOYEB_SERVICE_NAME }}\`
          - **URL**: https://nemotron-3-inference-dealexmachina-53d19e1c.koyeb.app
          EOF

  redeploy-only:
    name: 🔄 Redeploy (no build)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.skip_build == 'true'
    environment:
      name: production
      url: https://nemotron-3-inference-dealexmachina-53d19e1c.koyeb.app

    steps:
      - name: 🚀 Redeploy to Koyeb via API
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:latest"
          SERVICE_ID="0660f41c-9519-406d-8caa-5c4587dfa03b"
          
          echo "📦 Redeploying with image: $IMAGE"
          echo "📍 Service ID: $SERVICE_ID"
          
          # Update service using Koyeb API directly
          curl -X PATCH "https://app.koyeb.com/v1/services/$SERVICE_ID" \
            -H "Authorization: Bearer ${KOYEB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"definition\": {
                \"name\": \"nemotron\",
                \"type\": \"WEB\",
                \"strategy\": {\"type\": \"DEPLOYMENT_STRATEGY_TYPE_ROLLING\"},
                \"routes\": [{\"path\": \"/\", \"port\": 8000}],
                \"ports\": [{\"port\": 8000, \"protocol\": \"http\"}],
                \"proxy_ports\": [],
                \"env\": [
                  {\"scopes\": [\"region:sfo\"], \"key\": \"HF_TOKEN\", \"secret\": \"hf-token\"},
                  {\"scopes\": [\"region:sfo\"], \"key\": \"VLLM_ATTENTION_BACKEND\", \"value\": \"FLASHINFER\"}
                ],
                \"regions\": [\"sfo\"],
                \"scalings\": [{
                  \"scopes\": [\"region:sfo\"],
                  \"min\": 1,
                  \"max\": 1
                }],
                \"instance_types\": [{\"scopes\": [\"region:sfo\"], \"type\": \"gpu-nvidia-h100\"}],
                \"health_checks\": [{
                  \"http\": {\"path\": \"/health\", \"port\": 8000, \"method\": \"GET\", \"headers\": []},
                  \"grace_period\": 300,
                  \"interval\": 30,
                  \"timeout\": 10,
                  \"restart_limit\": 3
                }],
                \"volumes\": [],
                \"config_files\": [],
                \"skip_cache\": false,
                \"docker\": {
                  \"image\": \"$IMAGE\",
                  \"image_registry_secret\": \"jeanbapt\",
                  \"privileged\": false
                }
              }
            }"
          
          echo "✅ Redeployment triggered!"
          echo "🔗 URL: https://nemotron-3-inference-dealexmachina-53d19e1c.koyeb.app"
